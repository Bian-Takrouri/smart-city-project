<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Citizen - Smart City</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary px-3">
        <a class="navbar-brand" href="index.html">🏙️ Smart City</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="add-request.html">Add Request</a></li>
                <li class="nav-item"><a class="nav-link" href="add-citizen.html">Add Citizen</a></li>
                <li class="nav-item"><a class="nav-link" href="track-request.html">Track Request</a></li>
                <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
            </ul>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="text-center">➕ Add New Citizen</h3>
                        <form id="citizenForm">
                            <input type="text" id="citizenId" class="form-control my-2" placeholder="Citizen ID (C101)" required>
                            <input type="text" id="name" class="form-control my-2" placeholder="Full Name" required>
                            <input type="email" id="email" class="form-control my-2" placeholder="Email" required>
                            <input type="text" id="phone" class="form-control my-2" placeholder="Phone">
                            <input type="text" id="district" class="form-control my-2" placeholder="District">
                            <input type="text" id="areaId" class="form-control my-2" placeholder="Area ID (A01, A02, A03, A04) optional">
                            <button type="submit" class="btn btn-success w-100">Add Citizen</button>
                            <div id="msg" class="mt-2 text-center"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('citizenForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const citizen = {
                citizenId: document.getElementById('citizenId').value,
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                district: document.getElementById('district').value,
                areaId: document.getElementById('areaId').value || null
            };
            try {
                const res = await fetch('http://localhost:5000/api/citizens', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(citizen)
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('msg').innerHTML = '<span class="text-success">✅ Citizen added! Redirecting...</span>';
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    document.getElementById('msg').innerHTML = '<span class="text-danger">❌ Error: ' + data.error + '</span>';
                }
            } catch(err) {
                document.getElementById('msg').innerHTML = '<span class="text-danger">❌ Network error</span>';
            }
        });
    </script>
</body>
</html>
