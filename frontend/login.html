<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Smart City</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary px-3">
        <a class="navbar-brand" href="index.html">🏙️ Smart City</a>
    </nav>
    <div class="container mt-5" style="max-width: 400px;">
        <h3>Login</h3>
        <input type="email" id="email" class="form-control mt-2" placeholder="Email">
        <input type="text" id="citizenId" class="form-control mt-2" placeholder="Citizen ID">
        <button class="btn btn-primary w-100 mt-3" onclick="login()">Login</button>
        <div id="msg" class="mt-2 text-center"></div>
    </div>
    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const citizenId = document.getElementById('citizenId').value;
            const msgDiv = document.getElementById('msg');

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, citizenId })
                });
                const data = await response.json();
                if (data.success) {
                    msgDiv.innerHTML = '<span class="text-success">✅ Login successful! Redirecting...</span>';
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    msgDiv.innerHTML = '<span class="text-danger">❌ ' + data.message + '</span>';
                }
            } catch(err) {
                msgDiv.innerHTML = '<span class="text-danger">❌ Cannot connect to server. Make sure backend is running on port 5000.</span>';
            }
        }
    </script>
</body>
</html>
