<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Track Request - Smart City</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary px-3">
        <a class="navbar-brand" href="index.html">🏙️ Smart City</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="add-request.html">Add Request</a></li>
                <li class="nav-item"><a class="nav-link" href="add-citizen.html">Add Citizen</a></li>
                <li class="nav-item"><a class="nav-link" href="track-request.html">Track Request</a></li>
                <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
            </ul>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="text-center">🔍 Track Service Request</h3>
                        <input type="text" id="requestId" class="form-control my-2" placeholder="Enter Request ID (e.g., R501)">
                        <button class="btn btn-primary w-100" onclick="trackRequest()">Track</button>
                        <div id="result" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function trackRequest() {
            const requestId = document.getElementById('requestId').value;
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="text-center">Loading...</div>';
            try {
                const res = await fetch('http://localhost:5000/api/requests');
                const data = await res.json();
                if (data.success && data.data) {
                    const request = data.data.find(r => r.requestId === requestId);
                    if (request) {
                        resultDiv.innerHTML = `
                            <div class="alert alert-info">
                                <strong>Request ID:</strong> ${request.requestId}<br>
                                <strong>Issue:</strong> ${request.issueType}<br>
                                <strong>Status:</strong> ${request.status}<br>
                                <strong>Priority:</strong> ${request.priority}<br>
                                <strong>Citizen:</strong> ${request.citizenId}<br>
                                <strong>Area:</strong> ${request.areaId || '-'}
                            </div>
                        `;
                    } else {
                        resultDiv.innerHTML = '<div class="alert alert-danger">Request not found</div>';
                    }
                }
            } catch(e) {
                resultDiv.innerHTML = '<div class="alert alert-danger">Network error</div>';
            }
        }
    </script>
</body>
</html>
